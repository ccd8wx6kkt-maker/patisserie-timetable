<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;padding:2rem 1.5rem;}
.wrap{max-width:960px;margin:0 auto;}
.header{margin-bottom:1.5rem;}
.header h1{font-size:20px;font-weight:500;color:#1a1a1a;margin-bottom:2px;}
.header p{font-size:13px;color:#888;}
.layout{display:flex;gap:16px;align-items:flex-start;}
.sidebar{width:196px;flex-shrink:0;}
.sidebar-title{font-size:10px;font-weight:600;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;padding:0 2px;}
.cat-label{font-size:10px;font-weight:600;color:#bbb;letter-spacing:.05em;margin:14px 0 5px 2px;}
.chip{padding:7px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:grab;margin-bottom:5px;border:1px solid transparent;user-select:none;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:opacity .15s;}
.chip:hover{opacity:.82;}
.chip-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(0,0,0,.09);flex-shrink:0;white-space:nowrap;}
.chip.used{opacity:.35;cursor:default;}
.timetable-area{flex:1;min-width:0;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.school-name{font-size:14px;font-weight:500;color:#1a1a1a;}
.right-bar{display:flex;align-items:center;gap:10px;}
.credit-total{font-size:12px;color:#666;background:#fff;padding:5px 12px;border-radius:8px;border:1px solid #e0ddd6;}
.credit-total span{font-weight:600;color:#1a1a1a;}
.clear-btn{font-size:12px;padding:5px 13px;border:1px solid #d0cdc6;border-radius:8px;background:#fff;color:#666;cursor:pointer;transition:background .15s;}
.clear-btn:hover{background:#f0ede8;}
.grid-wrap{display:flex;border:1px solid #e0ddd6;border-radius:12px;overflow:hidden;background:#fff;}
.time-col{width:48px;flex-shrink:0;border-right:1px solid #e0ddd6;}
.t-hdr{height:34px;background:#f8f7f4;border-bottom:1px solid #e0ddd6;}
.t-slot{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 7px 0 0;font-size:10px;color:#bbb;border-bottom:1px solid #e0ddd6;}
.days-wrap{display:flex;flex:1;min-width:0;}
.day-col{flex:1;min-width:0;border-right:1px solid #e0ddd6;position:relative;}
.day-col:last-child{border-right:none;}
.d-hdr{height:34px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#888;background:#f8f7f4;border-bottom:1px solid #e0ddd6;}
.d-body{position:relative;}
.cell{height:52px;border-bottom:1px solid #e0ddd6;}
.cell:last-child{border-bottom:none;}
.cell.drag-over{background:rgba(211,163,95,.12);}
.block{position:absolute;left:2px;right:2px;border-radius:6px;padding:5px 7px;cursor:grab;overflow:hidden;z-index:10;border:1px solid transparent;}
.block:hover{z-index:20;filter:brightness(.97);}
.block.dragging{opacity:.7;z-index:100;cursor:grabbing;}
.b-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-room{font-size:10px;opacity:.68;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.b-credit{font-size:10px;font-weight:600;opacity:.82;margin-top:2px;}
.b-del{position:absolute;top:4px;right:5px;font-size:11px;opacity:0;cursor:pointer;padding:2px;line-height:1;}
.block:hover .b-del{opacity:.5;}
.b-del:hover{opacity:1!important;}
.b-rsz{position:absolute;bottom:0;left:0;right:0;height:7px;cursor:ns-resize;border-radius:0 0 6px 6px;}
.hint{font-size:11px;color:#bbb;margin-top:9px;text-align:center;}
</style>

const START=9,END=20,SLOTS=END-START,SLOT_H=52;

const CATALOG=[
  {id:'c1', name:'브레드 베이킹 기초',  room:'라 포르네 관 101',    cat:'제빵', credits:3, color:{bg:'#FEF3E2',text:'#7C4A00',border:'#F5C97A'}},
  {id:'c2', name:'아르티장 브레드',      room:'라 포르네 관 102',    cat:'제빵', credits:2, color:{bg:'#FEF3E2',text:'#7C4A00',border:'#F5C97A'}},
  {id:'c3', name:'바게트 & 크루아상',   room:'라 포르네 관 201',    cat:'제빵', credits:3, color:{bg:'#FEF3E2',text:'#7C4A00',border:'#F5C97A'}},
  {id:'c4', name:'파티세리 기초',        room:'르 수크레 관 101',    cat:'제과', credits:2, color:{bg:'#FBE8F3',text:'#6B1B42',border:'#EDA8CF'}},
  {id:'c5', name:'초콜라티에 입문',      room:'르 수크레 관 102',    cat:'제과', credits:3, color:{bg:'#FBE8F3',text:'#6B1B42',border:'#EDA8CF'}},
  {id:'c6', name:'타르트 & 파이',       room:'르 수크레 관 201',    cat:'제과', credits:2, color:{bg:'#FBE8F3',text:'#6B1B42',border:'#EDA8CF'}},
  {id:'c7', name:'케이크 디자인',        room:'르 수크레 관 202',    cat:'제과', credits:3, color:{bg:'#FBE8F3',text:'#6B1B42',border:'#EDA8CF'}},
  {id:'c8', name:'웨딩 케이크 마스터',  room:'라 그라스 관 301',    cat:'제과', credits:2, color:{bg:'#FBE8F3',text:'#6B1B42',border:'#EDA8CF'}},
  {id:'c9', name:'냉동 디저트 & 글라세',room:'라 그라스 관 101',    cat:'제과', credits:3, color:{bg:'#E8F4FB',text:'#0D3F6E',border:'#8EC9EF'}},
  {id:'c10',name:'마카롱 아틀리에',     room:'라 마종 관 201',      cat:'제과', credits:2, color:{bg:'#FBE8F3',text:'#6B1B42',border:'#EDA8CF'}},
  {id:'c11',name:'다도 & 티 페어링',   room:'라 마종 관 101',      cat:'교양', credits:2, color:{bg:'#E8F5EE',text:'#0D4A2A',border:'#7DCCA4'}},
  {id:'c12',name:'플라워 케이크 데코',  room:'라 마종 관 102',      cat:'교양', credits:3, color:{bg:'#E8F5EE',text:'#0D4A2A',border:'#7DCCA4'}},
  {id:'c13',name:'테이블 플로리스트리', room:'라 마종 관 103',      cat:'교양', credits:2, color:{bg:'#E8F5EE',text:'#0D4A2A',border:'#7DCCA4'}},
  {id:'c14',name:'프렌치 에티켓',        room:'라 마종 관 104',      cat:'교양', credits:2, color:{bg:'#E8F5EE',text:'#0D4A2A',border:'#7DCCA4'}},
  {id:'c15',name:'푸드 포토그래피',     room:'라 뤼미에르 관 B1',  cat:'교양', credits:3, color:{bg:'#E8F5EE',text:'#0D4A2A',border:'#7DCCA4'}},
  {id:'c16',name:'식품 위생학',          room:'라 사이언스 관 201',  cat:'이론', credits:2, color:{bg:'#EEEDFE',text:'#3C3489',border:'#AFA9EC'}},
  {id:'c17',name:'제과제빵 재료학',     room:'라 사이언스 관 202',  cat:'이론', credits:3, color:{bg:'#EEEDFE',text:'#3C3489',border:'#AFA9EC'}},
  {id:'c18',name:'베이커리 경영론',      room:'라 사이언스 관 301',  cat:'이론', credits:2, color:{bg:'#EEEDFE',text:'#3C3489',border:'#AFA9EC'}},
];

const CAT_ORDER=['제빵','제과','교양','이론'];
let placed=[],idCounter=0,dragChip=null,dragBlock=null,resizeState=null;

function updateTotalCredits(){
  const total=placed.reduce((s,p)=>{const c=CATALOG.find(x=>x.id===p.cid);return s+(c?c.credits:0);},0);
  document.getElementById('totalCredit').textContent=total;
}

function buildSidebar(){
  const list=document.getElementById('chipList');
  list.innerHTML='';
  CAT_ORDER.forEach(cat=>{
    const items=CATALOG.filter(c=>c.cat===cat);
    if(!items.length) return;
    const lbl=document.createElement('div');
    lbl.className='cat-label';
    lbl.textContent=cat;
    list.appendChild(lbl);
    items.forEach(course=>{
      const isUsed=placed.some(p=>p.cid===course.id);
      const chip=document.createElement('div');
      chip.className='chip'+(isUsed?' used':'');
      chip.style.cssText=`background:${course.color.bg};color:${course.color.text};border-color:${course.color.border}`;
      chip.innerHTML=`<span class="chip-name">${course.name}</span><span class="chip-badge">${course.credits}학점</span>`;
      if(!isUsed){
        chip.draggable=true;
        chip.addEventListener('dragstart',e=>{dragChip=course.id;dragBlock=null;e.dataTransfer.effectAllowed='copy';});
      }
      list.appendChild(chip);
    });
  });
}

function buildGrid(){
  const tc=document.getElementById('timeCol');
  tc.innerHTML='<div class="t-hdr"></div>';
  for(let i=0;i<SLOTS;i++){
    const d=document.createElement('div');
    d.className='t-slot';
    d.textContent=(START+i)+':00';
    tc.appendChild(d);
  }
  const dw=document.getElementById('daysWrap');
  dw.innerHTML='';
  DAYS.forEach((day,di)=>{
    const col=document.createElement('div');
    col.className='day-col';
    col.innerHTML=`<div class="d-hdr">${day}</div>`;
    const body=document.createElement('div');
    body.className='d-body';
    body.dataset.day=di;
    for(let i=0;i<SLOTS;i++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.slot=i;
      cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drag-over');});
      cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
      cell.addEventListener('drop',e=>{
        e.preventDefault();cell.classList.remove('drag-over');
        const day=parseInt(body.dataset.day),slot=parseInt(cell.dataset.slot);
        if(dragChip){
          const course=CATALOG.find(c=>c.id===dragChip);
          if(!course) return;
          const dur=course.credits;
          if(hasOverlap(day,slot,dur,null)) return;
          placed.push({id:++idCounter,cid:course.id,day,slot,duration:dur});
          dragChip=null;renderBlocks();buildSidebar();updateTotalCredits();
        } else if(dragBlock!==null){
          const blk=placed.find(p=>p.id===dragBlock);
          if(!blk||hasOverlap(day,slot,blk.duration,dragBlock)) return;
          blk.day=day;blk.slot=Math.max(0,Math.min(SLOTS-blk.duration,slot));
          dragBlock=null;renderBlocks();
        }
      });
      body.appendChild(cell);
    }
    col.appendChild(body);dw.appendChild(col);
  });
}

function hasOverlap(day,slot,dur,excludeId){
  return placed.some(p=>p.id!==excludeId&&p.day===day&&!(slot+dur<=p.slot||slot>=p.slot+p.duration));
}

function renderBlocks(){
  document.querySelectorAll('.block').forEach(el=>el.remove());
  placed.forEach(blk=>{
    const course=CATALOG.find(c=>c.id===blk.cid);
    if(!course) return;
    const body=document.querySelector(`.d-body[data-day="${blk.day}"]`);
    if(!body) return;
    const el=document.createElement('div');
    el.className='block';
    el.dataset.id=blk.id;
    el.style.cssText=`background:${course.color.bg};color:${course.color.text};border-color:${course.color.border};top:${blk.slot*SLOT_H+1}px;height:${blk.duration*SLOT_H-2}px;`;
    el.innerHTML=`<div class="b-name">${course.name}</div><div class="b-room">${course.room}</div><div class="b-credit">${course.credits}학점</div><div class="b-del">✕</div><div class="b-rsz"></div>`;
    el.draggable=true;
    el.addEventListener('dragstart',e=>{dragBlock=blk.id;dragChip=null;e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.querySelector('.b-del').addEventListener('mousedown',e=>{
      e.stopPropagation();
      placed=placed.filter(p=>p.id!==blk.id);
      renderBlocks();buildSidebar();updateTotalCredits();
    });
    el.querySelector('.b-rsz').addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();
      resizeState={id:blk.id,startY:e.clientY,origDur:blk.duration};
    });
    body.appendChild(el);
  });
}

document.addEventListener('mousemove',e=>{
  if(!resizeState) return;
  const blk=placed.find(p=>p.id===resizeState.id);
  if(!blk) return;
  const newDur=Math.max(1,Math.min(SLOTS-blk.slot,resizeState.origDur+Math.round((e.clientY-resizeState.startY)/SLOT_H)));
  if(blk.duration!==newDur){blk.duration=newDur;renderBlocks();}
});
document.addEventListener('mouseup',()=>{resizeState=null;});

function clearAll(){
  if(!placed.length) return;
  if(confirm('시간표를 초기화하시겠습니까?')){placed=[];renderBlocks();buildSidebar();updateTotalCredits();}
}
window.clearAll=clearAll;

buildGrid();
buildSidebar();
</script>
</body>
</html>
